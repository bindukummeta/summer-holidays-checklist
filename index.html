<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffdca8" />
  <title>Summer Checklist — Kids' Holidays</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Summer Checklist" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>☀️ Summer Checklist</h1>
    <p class="subtitle">Make the most of the school holidays</p>
  </header>

  <main>
    <section class="card hero-card">
      <div class="hero">
        <div class="hero-emoji" id="hero-emoji">🌱</div>
        <div class="hero-copy">
          <h2 id="hero-title">Let's get started!</h2>
          <div class="hero-bar">
            <span class="hero-bar-fill" id="hero-bar-fill"></span>
          </div>
          <p class="hero-sub" id="hero-sub"><b id="hero-count">0 of 0</b> · Tick things off as you go</p>
        </div>
      </div>
      <div id="all-done" class="all-done hidden">🎉 Amazing — you've done it all!</div>
    </section>

    <div class="chips" id="chips"></div>

    <section class="card">
      <div id="checklist"></div>
      <div class="result-actions">
        <button id="reset-daily" class="btn-secondary">Reset daily basics</button>
        <button id="reset-all" class="btn-secondary">Uncheck everything</button>
      </div>
    </section>
  </main>

  <canvas id="confetti" class="confetti"></canvas>

  <footer class="app-footer">
    <span id="install-hint"></span>
  </footer>

  <script src="checklist-data.js"></script>
  <script src="app.js"></script>
  <script>
    // Register the service worker in production only. On localhost we skip it (and
    // unregister any existing one) so code edits always show up on reload.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var host = location.hostname;
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '';
      if (isLocal) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
        return;
      }
      // When a new service worker takes control (after a deploy), reload once so
      // the freshly-fetched code is applied without a manual hard-refresh.
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').then(function (reg) {
          // If an updated worker is waiting, activate it immediately.
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        });
        // Proactively check for a new version each time the app loads.
        navigator.serviceWorker.ready.then(function (reg) { reg.update(); });
      });
    })();
  </script>
</body>
</html>
